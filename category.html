<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorie - Film Streaming</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .category-hero {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 80px 20px;
            text-align: center;
            position: relative;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.4));
        }

        .category-hero-content {
            position: relative;
            z-index: 2;
        }

        .category-hero h1 {
            font-size: 3.5rem;
            margin: 0 0 20px 0;
            color: #f4c10f;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
        }

        .category-hero p {
            font-size: 1.2rem;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            max-width: 600px;
            margin: 0 auto;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #f4c10f;
            color: #121212;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(244, 193, 15, 0.3);
        }

        .back-button:hover {
            background: #e0b509;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 193, 15, 0.4);
        }

        .category-movies {
            padding: 40px 0;
            background-color: #121212;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-card-category {
            background-color: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .movie-card-category:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(244, 193, 15, 0.2);
        }

        .movie-card-category img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-card-category .content {
            padding: 20px;
        }

        .movie-card-category .content h3 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            color: #f4c10f;
        }

        .movie-card-category .content p {
            margin: 5px 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #cccccc;
        }

        .movie-rating {
            display: inline-block;
            background: #f4c10f;
            color: #121212;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .category-hero h1 {
                font-size: 2.5rem;
            }

            .category-hero p {
                font-size: 1rem;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
                padding: 15px;
            }

            .back-button {
                position: relative;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="goBack()">← Zurück zur Übersicht</button>
    
    <div class="category-hero" id="categoryHero">
        <div class="category-hero-content">
            <h1 id="categoryTitle">Kategorie wird geladen...</h1>
            <p id="categoryDescription">Beschreibung wird geladen...</p>
        </div>
    </div>

    <div class="category-movies">

            <!-- Movies will be loaded here -->

        // Function to get URL parameters
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Function to load category data
        function loadCategoryData() {
            const categoryId = getUrlParameter('category');
            
            if (!categoryId || !categoryDatabase[categoryId]) {
                document.getElementById('categoryTitle').textContent = 'Kategorie nicht gefunden';
                document.getElementById('categoryDescription').textContent = 'Die angeforderte Kategorie existiert nicht.';
                return;
            }

            const category = categoryDatabase[categoryId];
            
            // Set page title
            document.title = category.title + ' - Film Streaming';
            
            // Set hero section
            document.getElementById('categoryTitle').textContent = category.title;
            document.getElementById('categoryDescription').textContent = category.description;
            document.getElementById('categoryHero').style.backgroundImage = `url('${category.background}')`;
            
            // Load movies
            loadMovies(category.movies);
        }

        // Function to load movies
        function loadMovies(movies) {
            const moviesGrid = document.getElementById('moviesGrid');
            moviesGrid.innerHTML = '';

            movies.forEach((movie, index) => {
                const movieCard = document.createElement('div');
                movieCard.className = 'movie-card-category';
                movieCard.style.animationDelay = `${index * 0.1}s`;
                
                movieCard.innerHTML = `
                    <img src="${movie.cover}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/300x400/1f1f1f/f4c10f?text=No+Image'">
                    <div class="content">
                        <h3>${movie.title}</h3>
                        <p><strong>Jahr:</strong> ${movie.year}</p>
                        <p>${movie.description}</p>
                        <span class="movie-rating">${movie.rating}</span>
                    </div>
                `;
                
                movieCard.addEventListener('click', () => {
                    window.location.href = `stream.html?id=${movie.id}`;
                });
                
                moviesGrid.appendChild(movieCard);
            });
        }

        // Function to go back
        function goBack() {
            window.location.href = 'index.html';
        }

        // Load category data when page loads
        window.onload = function() {
            loadCategoryData();
        };
